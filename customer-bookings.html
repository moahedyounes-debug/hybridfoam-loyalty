<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>حجوزاتي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:"Tajawal",sans-serif;
      background:#050608;
      color:#f5f5f5;
      padding:16px;
    }
    h2{
      text-align:center;
      margin-bottom:12px;
    }
    .section{
      background:#111318;
      border-radius:16px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 8px 20px rgba(0,0,0,0.6);
    }
    .booking-card{
      background:#1a1c22;
      padding:10px;
      border-radius:10px;
      margin-bottom:8px;
      font-size:13px;
    }
    .empty{
      font-size:13px;
      color:#6b7280;
      text-align:center;
      margin-top:20px;
    }
    .btn{
      width:100%;
      padding:10px 12px;
      margin-top:8px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:white;
      font-size:14px;
      cursor:pointer;
    }
    .btn-outline{
      background:transparent;
      border:1px solid #374151;
    }
  </style>
</head>

<body>

<h2>حجوزاتي</h2>

<div class="section">
  <div id="bookingsBox" class="empty">جاري التحميل...</div>

  <button class="btn" onclick="window.location.href='customer-booking.html'">
    حجز موعد جديد
  </button>
  <button class="btn btn-outline" onclick="window.location.href='customer-dashboard.html'">
    العودة للوحة العميل
  </button>
</div>

<script src="api.js"></script>
<script>

let CUSTOMER = JSON.parse(localStorage.getItem("customer") || "null");
let PHONE = CUSTOMER ? CUSTOMER.phone : null;

(function(){
  if(!CUSTOMER || !PHONE){
    window.location.href = "customer-login.html";
  }
})();

/* =============================
   دالة موحدة: اليوم + التاريخ + الوقت
============================= */
function parseBookingDateTime(rawDate, rawTime) {
  let day = "";
  let date = "";
  let time = "";

  /* معالجة التاريخ */
  let jsDate = null;

  if (rawDate) {
    // ISO مثل 2026-03-15
    if (/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) {
      jsDate = new Date(rawDate);
    }
    // نص مثل Mar/17/2026
    else if (isNaN(rawDate)) {
      jsDate = new Date(rawDate);
    }
  }

  if (jsDate && !isNaN(jsDate)) {
    day = jsDate.toLocaleDateString("ar-SA", { weekday: "long" });
    const month = jsDate.toLocaleString("en-US", { month: "short" });
    const d = String(jsDate.getDate()).padStart(2, "0");
    const y = jsDate.getFullYear();
    date = `${month}/${d}/${y}`;
  }

  /* معالجة الوقت */
  if (rawTime) {
    // 12 ساعة مثل 4:30 PM
    if (rawTime.includes("AM") || rawTime.includes("PM")) {
      const t = new Date("2000-01-01 " + rawTime);
      if (!isNaN(t)) {
        const hh = String(t.getHours()).padStart(2, "0");
        const mm = String(t.getMinutes()).padStart(2, "0");
        time = `${hh}:${mm}`;
      }
    }
    // 24 ساعة مثل 14:30
    else if (/^\d{1,2}:\d{2}/.test(rawTime)) {
      time = rawTime.slice(0, 5);
    }
  }

  return { day, date, time };
}

/* =============================
   تحميل الحجوزات
============================= */
window.onload = async function(){
  const box = document.getElementById("bookingsBox");

  const res = await apiGetBookingsByPhone(PHONE);
  if(!res.success || !res.bookings || res.bookings.length === 0){
    box.innerHTML = "لا توجد حجوزات.";
    return;
  }

  const bookings = res.bookings.map(b => b.data);

  box.classList.remove("empty");

  box.innerHTML = bookings.map(b => {

    const service = b[2];

    const dt = parseBookingDateTime(b[3], b[4]);

    const day  = dt.day;
    const date = dt.date;
    const time = dt.time;

    const status = b[5];

    return `
      <div class="booking-card">
        <b>${day}</b><br>
        الخدمة: ${service}<br>
        التاريخ: ${date}<br>
        الوقت: ${time}<br>
        الحالة: ${status}
      </div>
    `;
  }).join("");
};

</script>

</body>
</html>
