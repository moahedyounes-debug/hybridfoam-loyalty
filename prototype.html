<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رغوة الهجين - إدارة الزيارات</title>
    <link rel="stylesheet" href="visit-manager.css">
    <script src="api.js"></script>
</head>
<body>
    <div class="container">
        <!-- العنوان -->
        <div class="page-header">
            <h1>رغوة الهجين</h1>
            <h2>إدارة الزيارات</h2>
        </div>

        <!-- شريط الملخص -->
        <div class="summary-bar">
            <div class="summary-item">
                <div class="label">الخدمات الحالية</div>
                <div class="value" id="summaryActive">0</div>
            </div>
            <div class="summary-item">
                <div class="label">السيارات حالياً</div>
                <div class="value" id="summaryCars">0</div>
            </div>
            <div class="summary-item">
                <div class="label">إجمالي المستحق</div>
                <div class="value" id="summaryTotal">0 ريال</div>
            </div>
        </div>

        <!-- السيارات داخل المغسلة -->
        <div class="section">
            <h3 class="section-title">🚗 سيارات داخل المغسلة (غير مدفوعة)</h3>
            <div id="activeVisitsList" class="cards">
                <div class="loading">جارِ التحميل...</div>
            </div>
            <button id="btnRefreshActive" class="btn-secondary full">🔄 تحديث القائمة</button>
        </div>

<!-- تسجيل الزيارة -->
<div id="visitBox" class="section">

<h3 class="section-title">📝 تسجيل زيارة جديدة</h3>

<!-- الصف الأول -->
<div class="row">
    <div>
        <label>أرقام اللوحة *</label>
        <input type="text" id="plate_numbers" placeholder="1234" required>
    </div>

    <div>
        <label>حروف اللوحة</label>
        <input type="text" id="plate_letters" placeholder="ABC">
    </div>

    <div>
        <label>براند السيارة *</label>
        <select id="car_type" required>
            <option value="">— اختر —</option>
        </select>
    </div>

    <div>
        <label>موديل السيارة *</label>
        <select id="car_model" required>
            <option value="">— اختر —</option>
        </select>
    </div>
</div>

<!-- الصف الثاني -->
<div class="row">
    <div>
        <label>نوع الخدمة *</label>
        <select id="service_type" required>
            <option value="">— اختر —</option>
        </select>
    </div>

    <div>
        <label>تفاصيل الخدمة *</label>
        <select id="service_detail" required>
            <option value="">— اختر —</option>
        </select>
    </div>

    <div>
        <label>السعر</label>
        <input type="number" id="price" readonly>
    </div>

    <div>
        <label>النقاط / العمولة</label>
        <input type="number" id="points" readonly>
    </div>
</div>

<!-- الصف الثالث -->
<div class="row">
    <div>
        <label>الموظف *</label>
        <select id="employee_in" required>
            <option value="">— اختر —</option>
        </select>
    </div>

    <div>
        <label>رقم الموقف *</label>
        <select id="parking_slot" required>
            <option value="">— اختر —</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
        </select>
    </div>

    <div>
        <label>الخصم</label>
        <input type="number" id="discount" value="0">
    </div>

    <div>
        <label>الإكرامية</label>
        <input type="number" id="tip" value="0">
    </div>
</div>

<!-- الصف الرابع -->
<div class="row">
    <div>
        <label>حالة الدفع *</label>
        <select id="payment_status" required>
            <option value="">— اختر —</option>
            <option value="مدفوع">مدفوع</option>
            <option value="غير مدفوع">غير مدفوع</option>
        </select>
    </div>

    <div>
        <label>طريقة الدفع *</label>
        <select id="payment_method">
            <option value="">— اختر —</option>
            <option value="كاش">كاش</option>
            <option value="شبكة">شبكة</option>
            <option value="جزئي">جزئي</option>
        </select>
    </div>

    <div id="cash_box" style="display:none;">
        <label>مبلغ الكاش</label>
        <input type="number" id="cash_amount" value="0">
    </div>

    <div id="card_box" style="display:none;">
        <label>مبلغ الشبكة</label>
        <input type="number" id="card_amount" value="0">
    </div>
</div>

<!-- الخدمات -->
<button id="btnAddService" class="btn-secondary full">➕ إضافة خدمة</button>

<div id="servicesList" class="services-box"></div>

<div class="total">الإجمالي: <span id="totalPrice">0</span> ريال</div>

<button id="btnSubmitVisit" class="btn-primary full" style="margin-top:20px;" onclick="submitVisit()">💾 تسجيل الزيارة</button>

</div>

</div>

    <!-- مودال التعديل -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-box large">
            <div class="modal-header">
                <h3>✏️ تعديل الزيارة</h3>
                <button id="editClose" class="btn-danger small">✕</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="tab-swap">🔄 تبديل خدمة</button>
                <button class="tab-btn" data-tab="tab-delete">🗑️ حذف خدمة</button>
                <button class="tab-btn" data-tab="tab-add">➕ إضافة خدمة</button>
                <button class="tab-btn" data-tab="tab-emp">👤 تغيير الموظف</button>
                <button class="tab-btn" data-tab="tab-disc">💰 تغيير الخصم</button>
                <button class="tab-btn" data-tab="tab-tip">🎁 تغيير الإكرامية</button>
            </div>

            <div class="tab-content">
<div id="tab-swap" class="tab-pane">
    <label>اختر الخدمة الحالية</label>
    <select id="swapOldServiceSelect"></select>

    <label style="margin-top:15px;">اختر الخدمة الجديدة</label>
    <select id="swapNewServiceSelect"></select>

    <button id="swapConfirm" class="btn-primary full">تأكيد التبديل</button>
</div>

                <div id="tab-delete" class="tab-pane">
                    <label>اختر الخدمة المراد حذفها</label>
                    <select id="deleteServiceSelect"></select>
                    <button id="deleteConfirm" class="btn-danger full">حذف الخدمة</button>
                </div>

                <div id="tab-add" class="tab-pane">
                    <label>اختر خدمة للإضافة</label>
                    <select id="addServiceSelect"></select>
                    <button id="addConfirm" class="btn-primary full">إضافة الخدمة</button>
                </div>

                <div id="tab-emp" class="tab-pane">
                    <label>اختر الموظف الجديد</label>
                    <select id="empSelect"></select>
                    <button id="empConfirm" class="btn-primary full">تحديث الموظف</button>
                </div>

                <div id="tab-disc" class="tab-pane">
                    <label>الخصم الجديد</label>
                    <input type="number" id="discInput" placeholder="0">
                    <button id="discConfirm" class="btn-primary full">تحديث الخصم</button>
                </div>

                <div id="tab-tip" class="tab-pane">
                    <label>الإكرامية الجديدة</label>
                    <input type="number" id="tipInput" placeholder="0">
                    <button id="tipConfirm" class="btn-primary full">تحديث الإكرامية</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast-container"></div>

    <!-- JavaScript -->
    <script src="visit-manager.js"></script>
</body>
</html>
