<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Prototype – أنظمة استقبال السيارات</title>
<style>
body {
    font-family: "Tajawal", sans-serif;
    background: #f3f4f6;
    margin: 0;
    padding: 0;
}
.tabs {
    display: flex;
    background: #fff;
    padding: 10px;
    border-bottom: 2px solid #ddd;
}
.tab-btn {
    padding: 12px 20px;
    margin-left: 10px;
    background: #e5e7eb;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
.tab-btn.active {
    background: #2563eb;
    color: #fff;
}
.tab-content {
    display: none;
    padding: 25px;
}
.tab-content.active {
    display: block;
}
.card {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
button {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}
.btn-primary { background: #2563eb; color: #fff; }
.btn-danger { background: #dc2626; color: #fff; }
.btn-secondary { background: #e5e7eb; }
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<!-- التبويبات -->
<div class="tabs">
    <button class="tab-btn active" data-tab="t1">نماذج متعددة</button>
    <button class="tab-btn" data-tab="t2">سلة السيارات</button>
    <button class="tab-btn" data-tab="t3">نموذج متعدد السيارات</button>
    <button class="tab-btn" data-tab="t4">الاستقبال السريع</button>
</div>

<!-- تبويب 1: نماذج متعددة -->
<div id="t1" class="tab-content active">
    <h2>نماذج متعددة</h2>
    <button id="addForm" class="btn-primary">+ إضافة سيارة</button>
    <div id="formsContainer"></div>
</div>

<!-- تبويب 2: سلة السيارات -->
<div id="t2" class="tab-content">
    <h2>سلة السيارات</h2>

    <div class="card">
        <h3>إضافة سيارة</h3>
        <input placeholder="رقم اللوحة">
        <select>
            <option>اختر الخدمة</option>
            <option>غسيل</option>
            <option>تلميع</option>
        </select>
        <button id="addToCart" class="btn-primary">إضافة للسلة</button>
    </div>

    <h3>السلة:</h3>
    <div id="cartList"></div>

    <button class="btn-primary">✔ تسجيل كل السيارات</button>
</div>

<!-- تبويب 3: نموذج متعدد السيارات -->
<div id="t3" class="tab-content">
    <h2>نموذج متعدد السيارات</h2>
    <button id="addMultiCar" class="btn-primary">+ إضافة سيارة</button>
    <div id="multiCarContainer"></div>
    <button class="btn-primary">تسجيل الزيارة</button>
</div>

<!-- تبويب 4: الاستقبال السريع -->
<div id="t4" class="tab-content">
    <h2>الاستقبال السريع</h2>

    <div class="card">
        <input placeholder="رقم اللوحة">
        <select>
            <option>اختر الخدمة</option>
            <option>غسيل</option>
            <option>تلميع</option>
        </select>
        <button id="fastAdd" class="btn-primary">إضافة</button>
    </div>

    <h3>السيارات المضافة:</h3>
    <div id="fastList"></div>
</div>

<script>
// التبويبات
document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
    };
});

// تبويب 1: نماذج متعددة
document.getElementById("addForm").onclick = () => {
    const box = document.createElement("div");
    box.className = "card";
    box.innerHTML = `
        <h3>سيارة جديدة</h3>
        <input placeholder="رقم اللوحة">
        <select>
            <option>اختر الخدمة</option>
            <option>غسيل</option>
            <option>تلميع</option>
        </select>
        <button class="btn-primary">تسجيل</button>
        <button class="btn-danger remove">حذف</button>
    `;
    box.querySelector(".remove").onclick = () => box.remove();
    document.getElementById("formsContainer").appendChild(box);
};

// تبويب 2: السلة
document.getElementById("addToCart").onclick = () => {
    const item = document.createElement("div");
    item.className = "card";
    item.innerHTML = `
        سيارة مضافة للسلة
        <button class="btn-danger remove">حذف</button>
    `;
    item.querySelector(".remove").onclick = () => item.remove();
    document.getElementById("cartList").appendChild(item);
};

// تبويب 3: نموذج متعدد السيارات
document.getElementById("addMultiCar").onclick = () => {
    const item = document.createElement("div");
    item.className = "card";
    item.innerHTML = `
        <h3>سيارة</h3>
        <input placeholder="رقم اللوحة">
        <select>
            <option>اختر الخدمة</option>
            <option>غسيل</option>
            <option>تلميع</option>
        </select>
        <button class="btn-danger remove">حذف</button>
    `;
    item.querySelector(".remove").onclick = () => item.remove();
    document.getElementById("multiCarContainer").appendChild(item);
};

// تبويب 4: الاستقبال السريع
document.getElementById("fastAdd").onclick = () => {
    const item = document.createElement("div");
    item.className = "card";
    item.innerHTML = `
        سيارة تمت إضافتها
        <button class="btn-danger remove">حذف</button>
    `;
    item.querySelector(".remove").onclick = () => item.remove();
    document.getElementById("fastList").appendChild(item);
};
</script>

</body>
</html>
