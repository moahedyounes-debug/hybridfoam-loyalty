<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Prototype – مقارنة أنظمة استقبال السيارات</title>

<style>
body {
    font-family: "Tajawal", sans-serif;
    background: #f3f4f6;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 25px;
}

/* التبويبات */
.tabs {
    display: flex;
    background: #fff;
    padding: 12px;
    border-bottom: 2px solid #ddd;
    position: sticky;
    top: 0;
    z-index: 50;
}

.tab-btn {
    padding: 12px 20px;
    margin-left: 10px;
    background: #e5e7eb;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

.tab-btn.active {
    background: #2563eb;
    color: #fff;
}

.tab-content {
    display: none;
    padding: 25px 0;
}

.tab-content.active {
    display: block;
}

/* شريط الملخص */
.summary-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
}

.summary-item {
    flex: 1;
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.summary-item .value {
    font-size: 2rem;
    font-weight: bold;
    color: #2563eb;
}

/* كروت السيارات */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 20px;
}

.car-card {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.car-card .card-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.car-card .actions button {
    margin-left: 8px;
}

/* نموذج تسجيل الزيارة */
.card {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 1rem;
}

label {
    font-weight: 600;
    color: #374151;
}

/* الأزرار */
button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.btn-primary { background: #2563eb; color: #fff; }
.btn-danger { background: #dc2626; color: #fff; }
.btn-secondary { background: #e5e7eb; }

/* Toast */
#toast-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.toast {
    background: #333;
    color: #fff;
    padding: 12px 20px;
    border-radius: 8px;
    opacity: 0;
    transform: translateY(-20px);
    transition: 0.3s;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>
<div class="container">

<!-- التبويبات -->
<div class="tabs">
    <button class="tab-btn active" data-tab="t1">نماذج متعددة</button>
    <button class="tab-btn" data-tab="t2">سلة السيارات</button>
    <button class="tab-btn" data-tab="t3">نموذج متعدد السيارات</button>
    <button class="tab-btn" data-tab="t4">الاستقبال السريع</button>
</div>
<!-- تبويب 1 -->
<div id="t1" class="tab-content active">

<h2>نماذج متعددة</h2>

<!-- شريط الملخص -->
<div class="summary-bar">
    <div class="summary-item">
        <div class="label">الخدمات الحالية</div>
        <div class="value">12</div>
    </div>
    <div class="summary-item">
        <div class="label">السيارات الحالية</div>
        <div class="value">5</div>
    </div>
    <div class="summary-item">
        <div class="label">إجمالي المستحق</div>
        <div class="value">320 ريال</div>
    </div>
</div>

<!-- قائمة السيارات -->
<h3>🚗 سيارات داخل المغسلة</h3>
<div class="cards">
    <div class="car-card">
        <div class="card-header">
            <strong>1234 ABC</strong>
            <span>تويوتا كامري</span>
        </div>
        <div>الخدمة: غسيل خارجي</div>
        <div>السعر: 25 ريال</div>
        <div class="actions" style="margin-top:10px;">
            <button class="btn-primary">💳 دفع</button>
            <button class="btn-secondary">✏️ تعديل</button>
            <button class="btn-danger">🚪 خروج</button>
        </div>
    </div>
</div>

<hr style="margin:30px 0;">

<!-- إضافة نماذج -->
<button id="addForm" class="btn-primary">+ إضافة سيارة</button>
<div id="formsContainer"></div>

</div>
<div id="t2" class="tab-content">

<h2>سلة السيارات</h2>

<!-- نموذج إضافة -->
<div class="card">
    <label>رقم اللوحة</label>
    <input placeholder="1234 ABC">

    <label>الخدمة</label>
    <select>
        <option>غسيل خارجي</option>
        <option>غسيل داخلي</option>
        <option>تلميع</option>
    </select>

    <button id="addToCart" class="btn-primary">إضافة للسلة</button>
</div>

<h3>السلة:</h3>
<div id="cartList"></div>

<button class="btn-primary">✔ تسجيل كل السيارات</button>

</div>
<div id="t3" class="tab-content">

<h2>نموذج متعدد السيارات</h2>

<button id="addMultiCar" class="btn-primary">+ إضافة سيارة</button>

<div id="multiCarContainer"></div>

<button class="btn-primary">تسجيل الزيارة</button>

</div>
<div id="t4" class="tab-content">

<h2>الاستقبال السريع</h2>

<div class="card">
    <label>رقم اللوحة</label>
    <input placeholder="1234 ABC">

    <label>الخدمة</label>
    <select>
        <option>غسيل خارجي</option>
        <option>غسيل داخلي</option>
    </select>

    <button id="fastAdd" class="btn-primary">إضافة</button>
</div>

<h3>السيارات المضافة:</h3>
<div id="fastList"></div>

</div>
<!-- مودال الدفع -->
<div id="paymentModal" class="modal-overlay" style="display:none;">
    <div class="card" style="max-width:400px;margin:auto;">
        <h3>💳 تحديث الدفع</h3>
        <label>طريقة الدفع</label>
        <select>
            <option>كاش</option>
            <option>شبكة</option>
            <option>جزئي</option>
        </select>
        <button class="btn-primary" onclick="closeModal()">تأكيد</button>
    </div>
</div>

<!-- مودال التعديل -->
<div id="editModal" class="modal-overlay" style="display:none;">
    <div class="card" style="max-width:400px;margin:auto;">
        <h3>✏️ تعديل الخدمة</h3>
        <label>الخدمة الجديدة</label>
        <select>
            <option>غسيل خارجي</option>
            <option>غسيل داخلي</option>
        </select>
        <button class="btn-primary" onclick="closeModal()">تحديث</button>
    </div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<script>
/* التبويبات */
document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
    };
});

/* تبويب 1 */
document.getElementById("addForm").onclick = () => {
    const box = document.createElement("div");
    box.className = "card";
    box.innerHTML = `
        <h3>سيارة جديدة</h3>
        <label>رقم اللوحة</label>
        <input placeholder="1234 ABC">
        <label>الخدمة</label>
        <select>
            <option>غسيل خارجي</option>
            <option>غسيل داخلي</option>
        </select>
        <button class="btn-primary">تسجيل</button>
        <button class="btn-danger remove">حذف</button>
    `;
    box.querySelector(".remove").onclick = () => box.remove();
    document.getElementById("formsContainer").appendChild(box);
};

/* تبويب 2 */
document.getElementById("addToCart").onclick = () => {
    const item = document.createElement("div");
    item.className = "card";
    item.innerHTML = `
        سيارة مضافة للسلة
        <button class="btn-danger remove">حذف</button>
    `;
    item.querySelector(".remove").onclick = () => item.remove();
    document.getElementById("cartList").appendChild(item);
};

/* تبويب 3 */
document.getElementById("addMultiCar").onclick = () => {
    const item = document.createElement("div");
    item.className = "card";
    item.innerHTML = `
        <h3>سيارة</h3>
        <label>رقم اللوحة</label>
        <input placeholder="1234 ABC">
        <label>الخدمة</label>
        <select>
            <option>غسيل خارجي</option>
            <option>غسيل داخلي</option>
        </select>
        <button class="btn-danger remove">حذف</button>
    `;
    item.querySelector(".remove").onclick = () => item.remove();
    document.getElementById("multiCarContainer").appendChild(item);
};

/* تبويب 4 */
document.getElementById("fastAdd").onclick = () => {
    const item = document.createElement("div");
    item.className = "card";
    item.innerHTML = `
        سيارة تمت إضافتها
        <button class="btn-danger remove">حذف</button>
    `;
    item.querySelector(".remove").onclick = () => item.remove();
    document.getElementById("fastList").appendChild(item);
};

/* مودالات */
function closeModal() {
    document.getElementById("paymentModal").style.display = "none";
    document.getElementById("editModal").style.display = "none";
}

/* Toast */
function showToast(msg) {
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    document.getElementById("toast-container").appendChild(t);
    setTimeout(() => t.classList.add("show"), 50);
    setTimeout(() => t.remove(), 3000);
}
</script>

</body>
</html>
